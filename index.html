function loadSet(key) {
  try { const raw = localStorage.getItem(key); return raw ? new Set(JSON.parse(raw)) : new Set(); }
  catch (e) { return new Set(); }
}
function saveSet(key, set) {
  try { localStorage.setItem(key, JSON.stringify(Array.from(set))); } catch (e) {}
}

function slugify(s) {
  return (s || '').toLowerCase()
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9\-]/g, '')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
}

// ============================================================
// AUTH HOOK
// ============================================================
function useAuth() {
  const [session, setSession] = useState(null);
  const [officer, setOfficer] = useState(null);  // row from `officers` table if authorized
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!supabase) { setLoading(false); return; }

    let mounted = true;

    // Get initial session
    supabase.auth.getSession().then(({ data }) => {
      if (mounted) {
        setSession(data.session);
        setLoading(false);
      }
    });

    // Listen for auth changes
    const { data: sub } = supabase.auth.onAuthStateChange((_event, sess) => {
      if (mounted) setSession(sess);
    });

    return () => { mounted = false; sub.subscription.unsubscribe(); };
  }, []);

  // When session changes, check if user is in officers table
  const refreshOfficer = useCallback(() => {
    if (!supabase || !session) { setOfficer(null); return; }
    supabase.from('officers').select('*').eq('email', session.user.email).maybeSingle()
      .then(({ data }) => setOfficer(data));
  }, [session]);

  useEffect(() => {
    refreshOfficer();
  }, [refreshOfficer]);

  return { session, officer, loading, refreshOfficer };
}

  );
}

function VehicleImage({ src, alt, className = '' }) {
  const [loaded, setLoaded] = useState(false);
  const [errored, setErrored] = useState(false);
  // PNG = transparent bg → contain. JPG/Supabase URL = full image → cover
  const isTransparent = src && /\.png(\?|$)/i.test(src);
  const fitClass = isTransparent ? 'object-contain' : 'object-cover';
  return (
    <div className={`relative ${className}`}>
      {!loaded && !errored && <div className="absolute inset-0 shimmer rounded-md" />}
      {errored || !src ? (
        <div className="absolute inset-0 flex items-center justify-center text-sasp-glow/40 font-mono text-[10px] uppercase tracking-widest">
          <div className="text-center">
            <Icons.Car size={40} className="mx-auto mb-1 opacity-50" />
            <div>Bez obrázku</div>
          </div>
        </div>
      ) : (
        <img
          src={src} alt={alt} loading="lazy" decoding="async"
          onLoad={() => setLoaded(true)}
          onError={() => { setErrored(true); setLoaded(true); }}
          className={`${isTransparent ? 'vehicle-img' : 'vehicle-img-photo'} w-full h-full ${fitClass} rounded-md transition-opacity duration-500 ${loaded ? 'opacity-100' : 'opacity-0'}`}
        />
      )}
    </div>
  );
}

function LoginModal({ open, onClose }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [mode, setMode] = useState('login'); // 'login' or 'signup'

  useEffect(() => {
    if (!open) return;
    document.body.classList.add('modal-open');
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => {
      document.body.classList.remove('modal-open');
      document.removeEventListener('keydown', onKey);
    };
  }, [open, onClose]);

  if (!open) return null;

  async function handleSubmit(e) {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      if (mode === 'signup') {
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) throw error;
        setError('Účet vytvořen! Zkontroluj e-mail pro potvrzení (pokud je email confirmation zapnutý).');
        setMode('login');
      } else {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        onClose();
      }
    } catch (err) {
      setError(err.message || 'Něco se pokazilo');
    } finally {
      setLoading(false);
    }
  }

  return (
    <motion.div
      className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm"
      initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
      onClick={onClose}
    >
      <motion.div
        onClick={(e) => e.stopPropagation()}
        initial={{ opacity: 0, scale: 0.94 }} animate={{ opacity: 1, scale: 1 }}
        className="w-full max-w-md clip-corners glass-strong rounded-lg p-6 border-sasp-glow/30 shadow-[0_0_60px_rgba(59,130,246,0.25)]"
      >
        <div className="flex items-center justify-between mb-6">
          <div className="flex items-center gap-2">
            <Icons.Lock size={18} className="text-sasp-glow" />
            <h2 className="font-display font-bold text-xl tracking-wider text-sasp-ice">Officer Login</h2>
          </div>
          <button onClick={onClose} className="p-1 text-sasp-glow/60 hover:text-sasp-glow transition" aria-label="Zavřít">
            <Icons.Close size={18} />
          </button>
        </div>

        <p className="font-mono text-[10px] uppercase tracking-widest text-sasp-glow/60 mb-6 leading-relaxed">
          {mode === 'login'
            ? 'Přihlas se pro editaci databáze.'
            : 'Vytvořit nový účet. Pro přístup k editaci musí admin přidat tvůj email do tabulky officers.'}
        </p>

        <form onSubmit={handleSubmit} className="space-y-4">
          <div>
            <label className="font-mono text-[10px] uppercase tracking-widest text-sasp-glow/60 mb-1">E-mail</label>
            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required autoComplete="email" />
          </div>
          <div>
            <label className="font-mono text-[10px] uppercase tracking-widest text-sasp-glow/60 mb-1">Heslo</label>
            <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required autoComplete={mode === 'login' ? 'current-password' : 'new-password'} />
          </div>

          {error && (
            <div className="p-3 rounded-md border border-red-400/30 bg-red-500/10 text-red-300 text-sm font-mono">
              {error}
            </div>
          )}

          <button type="submit" disabled={loading}
                  className="w-full px-4 py-2.5 rounded-md font-mono text-xs uppercase tracking-widest transition
                             bg-sasp-glow text-sasp-black hover:bg-sasp-ice disabled:opacity-50 flex items-center justify-center gap-2">
            {loading ? <Icons.Loader size={14} /> : (mode === 'login' ? <Icons.Lock size={14} /> : <Icons.Plus size={14} />)}
            <span>{loading ? 'Pracuji...' : (mode === 'login' ? 'Přihlásit se' : 'Vytvořit účet')}</span>
          </button>

          <button type="button" onClick={() => { setMode(mode === 'login' ? 'signup' : 'login'); setError(''); }}
                  className="w-full text-center font-mono text-[10px] uppercase tracking-widest text-sasp-glow/60 hover:text-sasp-glow transition">
            {mode === 'login' ? 'Vytvořit nový účet →' : '← Přihlásit se k existujícímu účtu'}
          </button>
        </form>
      </motion.div>
    </motion.div>
  );
}

function VehicleEditor({ open, vehicle, onClose, onSave, isUploading }) {
  // vehicle === null → add mode
  // vehicle === object → edit mode
  const isEdit = !!vehicle;

  const [form, setForm] = useState(() => ({
    id: vehicle?.id || '',
    vehicle: vehicle?.vehicle || '',
    tier: vehicle?.tier || 'A',
    notes: vehicle?.notes || '',
    image: vehicle?.image || '',
    responses: vehicle?.responses ? JSON.parse(JSON.stringify(vehicle.responses)) : [
      { tier: 'A', cars: [] }
    ],
  }));
  const [imageFile, setImageFile] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [error, setError] = useState('');
  const fileInputRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    document.body.classList.add('modal-open');
    return () => document.body.classList.remove('modal-open');
  }, [open]);

  if (!open) return null;

  // Auto-generate ID from name if in add mode
  function updateName(name) {
    setForm(f => ({
      ...f,
      vehicle: name,
      id: isEdit ? f.id : (slugify(name) + '-' + f.tier.toLowerCase().replace('+', 'plus')),
    }));
  }

  function updateTier(tier) {
    setForm(f => ({
      ...f,
      tier,
      id: isEdit ? f.id : (slugify(f.vehicle) + '-' + tier.toLowerCase().replace('+', 'plus')),
    }));
  }

  function addResponseRow() {
    setForm(f => {
      const usedTiers = new Set(f.responses.map(r => r.tier));
      const available = ['S+', 'S', 'A+', 'A'].find(t => !usedTiers.has(t));
      if (!available) return f;
      return { ...f, responses: [...f.responses, { tier: available, cars: [] }] };
    });
  }

  function removeResponseRow(idx) {
    setForm(f => ({ ...f, responses: f.responses.filter((_, i) => i !== idx) }));
  }

  function updateResponseTier(idx, tier) {
    setForm(f => ({
      ...f,
      responses: f.responses.map((r, i) => i === idx ? { ...r, tier } : r),
    }));
  }

  function toggleResponseCar(idx, car) {
    setForm(f => ({
      ...f,
      responses: f.responses.map((r, i) => {
        if (i !== idx) return r;
        const has = r.cars.includes(car);
        return { ...r, cars: has ? r.cars.filter(c => c !== car) : [...r.cars, car] };
      }),
    }));
  }

  function onImagePick(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      setError('Obrázek je větší než 5 MB');
      return;
    }
    setImageFile(file);
    const reader = new FileReader();
    reader.onload = (ev) => setImagePreview(ev.target.result);
    reader.readAsDataURL(file);
  }

  async function handleSave() {
    setError('');
    if (!form.vehicle.trim()) { setError('Název vozidla je povinný'); return; }
    if (!form.id.trim()) { setError('ID je povinné'); return; }
    if (form.responses.length === 0) { setError('Přidej alespoň jednu response variantu'); return; }

    try {
      await onSave({ ...form }, imageFile);
      onClose();
    } catch (err) {
      setError(err.message || 'Chyba při ukládání');
    }
  }

  // Currently shown image (preview > existing)
  const previewSrc = imagePreview || form.image || null;

  return (
    <motion.div
      className="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8 bg-black/70 backdrop-blur-sm"
      initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
    >
      <motion.div
        initial={{ opacity: 0, scale: 0.94, y: 20 }} animate={{ opacity: 1, scale: 1, y: 0 }}
        className="relative w-full max-w-3xl max-h-[92vh] overflow-y-auto clip-corners glass-strong rounded-lg border-sasp-glow/30 shadow-[0_0_60px_rgba(59,130,246,0.25)]"
      >
        <div className="sticky top-0 z-10 flex items-center justify-between p-4 md:px-6 border-b border-sasp-glow/15 bg-sasp-carbon/85 backdrop-blur">
          <div className="flex items-center gap-3">
            {isEdit ? <Icons.Edit size={18} className="text-sasp-glow" /> : <Icons.Plus size={18} className="text-emerald-400" />}
            <h2 className="font-display font-bold text-lg tracking-wider text-sasp-ice">
              {isEdit ? `Upravit · ${vehicle.vehicle}` : 'Nové vozidlo'}
            </h2>
          </div>
          <button onClick={onClose} disabled={isUploading}
                  className="p-2 rounded-md glass border border-sasp-glow/20 text-sasp-glow/80 hover:text-red-400 hover:border-red-400/40 transition disabled:opacity-50">
            <Icons.Close size={16} />
          </button>
        </div>

        <div className="p-6 md:p-8 space-y-6">
          {/* Top section: image + basic info side by side */}
          <div className="grid md:grid-cols-2 gap-6">
            {/* Image picker */}
            <div className="space-y-3">
              <label className="font-mono text-[10px] uppercase tracking-widest text-sasp-glow/60">Obrázek vozidla</label>
              <div className="relative h-48 rounded-lg glass border border-sasp-glow/15 flex items-center justify-center overflow-hidden">
                {previewSrc ? (
                  <VehicleImage src={previewSrc} alt={form.vehicle} className="w-full h-full" />
                ) : (
                  <div className="text-center text-sasp-glow/40">
                    <Icons.Car size={40} className="mx-auto mb-2 opacity-50" />
                    <div className="font-mono text-[10px] uppercase tracking-widest">Žádný obrázek</div>
                  </div>
                )}
              </div>
              <input ref={fileInputRef} type="file" accept="image/png,image/jpeg,image/webp" onChange={onImagePick} className="hidden" />
              <div className="flex gap-2">
                <button type="button" onClick={() => fileInputRef.current?.click()} disabled={isUploading}
                        className="flex-1 flex items-center justify-center gap-2 px-3 py-2 rounded-md glass border border-sasp-glow/20 font-mono text-[10px] uppercase tracking-widest text-sasp-glow/80 hover:text-sasp-glow hover:border-sasp-glow/50 transition disabled:opacity-50">
                  <Icons.Upload size={12} />
                  <span>Nahrát soubor</span>
                </button>
                {(form.image || imagePreview) && (
                  <button type="button" onClick={() => { setImageFile(null); setImagePreview(null); setForm(f => ({...f, image: ''})); }} disabled={isUploading}
                          className="px-3 py-2 rounded-md glass border border-red-400/30 text-red-400/90 hover:text-red-400 hover:border-red-400/60 transition disabled:opacity-50"
                          title="Odebrat obrázek">
                    <Icons.Trash size={12} />
                  </button>
                )}
              </div>
              <p className="font-mono text-[9px] uppercase tracking-widest text-sasp-glow/40">
                PNG / JPG / WebP · max 5 MB
              </p>
            </div>

            {/* Basic info */}
            <div className="space-y-4">
              <div>
                <label className="font-mono text-[10px] uppercase tracking-widest text-sasp-glow/60 mb-1">Název vozidla *</label>
                <input type="text" value={form.vehicle} onChange={(e) => updateName(e.target.value)} placeholder="např. Itali GTO" />
              </div>

              <div>
                <label className="font-mono text-[10px] uppercase tracking-widest text-sasp-glow/60 mb-1">Tier suspect vozidla *</label>
                <div className="flex gap-1">
                  {['S+', 'S', 'A+', 'A'].map(t => (
                    <button key={t} type="button" onClick={() => updateTier(t)}
                            className="flex-1 px-2 py-2 rounded-md font-mono text-xs font-bold uppercase tracking-wider transition border"
                            style={{
                              background: form.tier === t ? `linear-gradient(135deg, ${TIER_META[t].color}, ${TIER_META[t].color}dd)` : 'rgba(13,20,36,0.5)',
                              color: form.tier === t ? '#000' : TIER_META[t].color,
                              borderColor: form.tier === t ? 'transparent' : `${TIER_META[t].color}40`,
                              boxShadow: form.tier === t ? `0 0 16px ${TIER_META[t].color}66` : 'none',
                            }}>
                      {t}
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <label className="font-mono text-[10px] uppercase tracking-widest text-sasp-glow/60 mb-1">ID (slug)</label>
                <input type="text" value={form.id} onChange={(e) => setForm(f => ({...f, id: e.target.value}))} placeholder="auto-generováno" disabled={isEdit} />
                <p className="font-mono text-[9px] uppercase tracking-widest text-sasp-glow/40 mt-1">
                  {isEdit ? 'ID nelze měnit po vytvoření' : 'Generuje se automaticky z názvu'}
                </p>
              </div>
            </div>
          </div>

          {/* Responses editor */}
          <div className="space-y-3">
            <div className="flex items-center justify-between">
              <label className="font-mono text-[10px] uppercase tracking-widest text-sasp-glow/60">Response podle tieru lokátoru</label>
              {form.responses.length < 4 && (
                <button type="button" onClick={addResponseRow}
                        className="flex items-center gap-1 px-2 py-1 rounded-md glass border border-sasp-glow/20 font-mono text-[10px] uppercase tracking-widest text-sasp-glow/80 hover:text-sasp-glow hover:border-sasp-glow/50 transition">
                  <Icons.Plus size={10} />
                  <span>Přidat řádek</span>
                </button>
              )}
            </div>

            {form.responses.map((r, idx) => (
              <div key={idx} className="rounded-md glass p-3 border border-sasp-glow/15 space-y-2">
                <div className="flex items-center gap-2">
                  <div className="flex gap-1">
                    {['S+', 'S', 'A+', 'A'].map(t => (
                      <button key={t} type="button" onClick={() => updateResponseTier(idx, t)}
                              className="px-2 py-1 rounded font-mono text-[10px] font-bold uppercase tracking-wider transition border"
                              style={{
                                background: r.tier === t ? `${TIER_META[t].color}30` : 'transparent',
                                color: r.tier === t ? TIER_META[t].color : '#94a3b8',
                                borderColor: r.tier === t ? `${TIER_META[t].color}60` : 'rgba(96,165,250,0.15)',
                              }}>
                        {t}
                      </button>
                    ))}
                  </div>
                  <div className="flex-1" />
                  <button type="button" onClick={() => removeResponseRow(idx)}
                          className="p-1.5 rounded-md text-red-400/70 hover:text-red-400 transition"
                          title="Smazat řádek">
                    <Icons.Trash size={12} />
                  </button>
                </div>
                <div className="flex flex-wrap gap-1.5">
                  {ALL_RESPONSE_CARS.map(car => {
                    const active = r.cars.includes(car);
                    return (
                      <button key={car} type="button" onClick={() => toggleResponseCar(idx, car)}
                              className={`px-2.5 py-1 rounded font-mono text-[10px] uppercase tracking-wider transition border
                                          ${active
                                            ? 'bg-sasp-glow text-sasp-black border-transparent shadow-[0_0_12px_rgba(96,165,250,0.4)]'
                                            : 'glass text-sasp-glow/70 border-sasp-glow/20 hover:text-sasp-glow hover:border-sasp-glow/50'}`}>
                        {active && '✓ '}{car}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>

          {/* Notes */}
          <div>
            <label className="font-mono text-[10px] uppercase tracking-widest text-sasp-glow/60 mb-1">Poznámky z terénu (volitelné)</label>
            <textarea value={form.notes} onChange={(e) => setForm(f => ({...f, notes: e.target.value}))}
                      rows={3} placeholder="např. Bez problemu stiha dominator" />
          </div>

          {error && (
            <div className="p-3 rounded-md border border-red-400/30 bg-red-500/10 text-red-300 text-sm font-mono">
              {error}
            </div>
          )}

          {/* Actions */}
          <div className="flex justify-end gap-2 pt-2 border-t border-sasp-glow/10">
            <button type="button" onClick={onClose} disabled={isUploading}
                    className="px-4 py-2 rounded-md glass border border-sasp-glow/20 font-mono text-[11px] uppercase tracking-widest text-sasp-glow/80 hover:text-sasp-glow hover:border-sasp-glow/50 transition disabled:opacity-50">
              Zrušit
            </button>
            <button type="button" onClick={handleSave} disabled={isUploading}
                    className="px-4 py-2 rounded-md font-mono text-[11px] uppercase tracking-widest transition bg-emerald-500/20 border border-emerald-400/40 text-emerald-300 hover:bg-emerald-500/30 hover:border-emerald-400/70 disabled:opacity-50 flex items-center gap-2">
              {isUploading ? <Icons.Loader size={12} /> : <Icons.Check size={12} />}
              <span>{isUploading ? 'Ukládám...' : (isEdit ? 'Uložit změny' : 'Vytvořit')}</span>
            </button>
          </div>
        </div>
      </motion.div>
    </motion.div>
  );
}
// ============================================================
// ADMIN PANEL - správa officerů + audit log
// ============================================================
function AdminPanel({ open, onClose, currentUserEmail }) {
  const [tab, setTab] = useState('officers');  // 'officers' | 'activity'

  const [officers, setOfficers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newEmail, setNewEmail] = useState('');
  const [newName, setNewName] = useState('');
  const [newIsAdmin, setNewIsAdmin] = useState(false);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');
  const [confirmRemove, setConfirmRemove] = useState(null);

  const [activityLog, setActivityLog] = useState([]);
  const [logLoading, setLogLoading] = useState(false);
  const [logFilter, setLogFilter] = useState({ type: null, action: null });

  async function loadOfficers() {
    setLoading(true);
    const { data, error } = await supabase
      .from('officers')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) setError(error.message);
    else setOfficers(data || []);
    setLoading(false);
  }

  async function loadActivity() {
    setLogLoading(true);
    const { data, error } = await supabase
      .from('activity_log')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(200);
    if (error) setError(error.message);
    else setActivityLog(data || []);
    setLogLoading(false);
  }

  useEffect(() => {
    if (!open) return;
    loadOfficers();
    loadActivity();
    document.body.classList.add('modal-open');
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);

    // Realtime subscription pro activity log
    const channel = supabase.channel('activity-log-realtime')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'activity_log' },
          (payload) => setActivityLog(prev => [payload.new, ...prev].slice(0, 200)))
      .subscribe();

    return () => {
      document.body.classList.remove('modal-open');
      document.removeEventListener('keydown', onKey);
      supabase.removeChannel(channel);
    };
  }, [open, onClose]);

  if (!open) return null;

  async function addOfficer(e) {
    e.preventDefault();
    setError('');
    if (!newEmail.trim()) { setError('Email je povinný'); return; }
    setBusy(true);
    try {
      const { error } = await supabase.from('officers').insert({
        email: newEmail.trim().toLowerCase(),
        display_name: newName.trim() || null,
        is_admin: newIsAdmin,
      });
      if (error) throw error;
      setNewEmail(''); setNewName(''); setNewIsAdmin(false);
      await loadOfficers();
    } catch (e) {
      setError(e.message);
    } finally {
      setBusy(false);
    }
  }

  async function removeOfficer(officer) {
    setBusy(true); setError('');
    try {
      const { error } = await supabase.from('officers').delete().eq('id', officer.id);
      if (error) throw error;
      await loadOfficers();
    } catch (e) {
      setError(e.message);
    } finally {
      setBusy(false);
      setConfirmRemove(null);
    }
  }

  async function toggleAdmin(officer) {
    setBusy(true); setError('');
    try {
      const { error } = await supabase.from('officers')
        .update({ is_admin: !officer.is_admin })
        .eq('id', officer.id);
      if (error) throw error;
      await loadOfficers();
    } catch (e) {
      setError(e.message);
    } finally {
      setBusy(false);
    }
  }

  // Filter activity log
  const filteredLog = activityLog.filter(l => {
    if (logFilter.type && l.entity_type !== logFilter.type) return false;
    if (logFilter.action && l.action !== logFilter.action) return false;
    return true;
  });

  function formatTimeAgo(iso) {
    const now = new Date();
    const then = new Date(iso);
    const diffMs = now - then;
    const sec = Math.floor(diffMs / 1000);
    if (sec < 60) return `před ${sec}s`;
    const min = Math.floor(sec / 60);
    if (min < 60) return `před ${min} min`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `před ${hr} h`;
    const day = Math.floor(hr / 24);
    if (day < 7) return `před ${day} d`;
    return then.toLocaleDateString('cs-CZ', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  const ACTION_META = {
    create: { color: '#22c55e', label: 'Vytvořeno', icon: <Icons.Plus size={12} /> },
    update: { color: '#3b82f6', label: 'Upraveno', icon: <Icons.Edit size={12} /> },
    delete: { color: '#ef4444', label: 'Smazáno', icon: <Icons.Trash size={12} /> },
  };

  const ENTITY_META = {
    vehicle: { label: 'Vozidlo', icon: <Icons.Car size={12} /> },
    officer: { label: 'Officer', icon: <Icons.Shield size={12} /> },
  };

  return (
    <motion.div
      className="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8 bg-black/70 backdrop-blur-sm"
      initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
      onClick={onClose}
    >
      <motion.div
        onClick={(e) => e.stopPropagation()}
        initial={{ opacity: 0, scale: 0.94, y: 20 }} animate={{ opacity: 1, scale: 1, y: 0 }}
        className="relative w-full max-w-4xl max-h-[92vh] overflow-y-auto clip-corners glass-strong rounded-lg border-sasp-glow/30 shadow-[0_0_60px_rgba(59,130,246,0.25)]"
      >
        <div className="sticky top-0 z-10 border-b border-sasp-glow/15 bg-sasp-carbon/85 backdrop-blur">
          <div className="flex items-center justify-between p-4 md:px-6">
            <div className="flex items-center gap-3">
              <Icons.Shield size={18} className="text-sasp-glow" />
              <h2 className="font-display font-bold text-lg tracking-wider text-sasp-ice">TEU Admin Panel</h2>
            </div>
            <button onClick={onClose}
                    className="p-2 rounded-md glass border border-sasp-glow/20 text-sasp-glow/80 hover:text-red-400 hover:border-red-400/40 transition">
              <Icons.Close size={16} />
            </button>
          </div>
          {/* Tabs */}
          <div className="flex gap-1 px-4 md:px-6 -mb-px">
            {[
              { id: 'officers', label: 'Officeři', icon: <Icons.Shield size={12} /> },
              { id: 'activity', label: 'Aktivita', icon: <Icons.Activity size={12} /> },
            ].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                      className={`flex items-center gap-2 px-4 py-2 font-mono text-[11px] uppercase tracking-widest transition border-b-2
                                  ${tab === t.id
                                    ? 'text-sasp-glow border-sasp-glow'
                                    : 'text-sasp-glow/50 border-transparent hover:text-sasp-glow/80'}`}>
                {t.icon}
                <span>{t.label}</span>
                {t.id === 'activity' && activityLog.length > 0 && (
                  <span className="px-1.5 rounded-full bg-sasp-glow/20 text-[9px]">{activityLog.length}</span>
                )}
              </button>
            ))}
          </div>
        </div>

        <div className="p-6 space-y-6">
          {/* ===== OFFICERS TAB ===== */}
          {tab === 'officers' && (
            <>
              <div>
                <SectionTitle icon={<Icons.Plus size={14} />} text="Přidat officera" />
                <form onSubmit={addOfficer} className="space-y-3 rounded-md glass p-4 border border-sasp-glow/15">
                  <div className="grid md:grid-cols-2 gap-3">
                    <div>
                      <label className="font-mono text-[10px] uppercase tracking-widest text-sasp-glow/60 mb-1">E-mail *</label>
                      <input type="email" value={newEmail} onChange={(e) => setNewEmail(e.target.value)}
                             placeholder="officer@example.com" required />
                    </div>
                    <div>
                      <label className="font-mono text-[10px] uppercase tracking-widest text-sasp-glow/60 mb-1">Jméno (volitelné)</label>
                      <input type="text" value={newName} onChange={(e) => setNewName(e.target.value)}
                             placeholder="např. Petr" />
                    </div>
                  </div>
                  <label className="flex items-center gap-2 cursor-pointer font-mono text-[10px] uppercase tracking-widest text-sasp-glow/70 hover:text-sasp-glow transition">
                    <input type="checkbox" checked={newIsAdmin} onChange={(e) => setNewIsAdmin(e.target.checked)}
                           className="!w-auto accent-sasp-glow" />
                    <span>Udělit admin práva (může spravovat ostatní)</span>
                  </label>
                  <p className="font-mono text-[9px] uppercase tracking-widest text-sasp-glow/40 leading-relaxed">
                    ⚠️ Officer si musí předem vytvořit účet přes "Officer login → Vytvořit nový účet" se stejným emailem.
                  </p>
                  <button type="submit" disabled={busy}
                          className="flex items-center gap-2 px-4 py-2 rounded-md font-mono text-[11px] uppercase tracking-widest transition border bg-emerald-500/20 border-emerald-400/40 text-emerald-300 hover:bg-emerald-500/30 hover:border-emerald-400/70 disabled:opacity-50">
                    {busy ? <Icons.Loader size={12} /> : <Icons.Plus size={12} />}
                    <span>{busy ? 'Přidávám...' : 'Přidat officera'}</span>
                  </button>
                </form>
              </div>

              <div>
                <SectionTitle icon={<Icons.Shield size={14} />} text={`Současní officeři (${officers.length})`} />
                {loading ? (
                  <div className="py-8 text-center"><Icons.Loader size={24} className="mx-auto text-sasp-glow/60" /></div>
                ) : officers.length === 0 ? (
                  <div className="py-8 text-center font-mono text-xs uppercase tracking-widest text-sasp-glow/50">Žádní officeři</div>
                ) : (
                  <div className="space-y-2">
                    {officers.map(o => {
                      const isSelf = o.email === currentUserEmail;
                      return (
                        <div key={o.id} className="flex items-center gap-3 p-3 rounded-md glass border border-sasp-glow/15">
                          <div className="flex items-center justify-center w-10 h-10 rounded-md bg-sasp-glow/10 border border-sasp-glow/30">
                            <Icons.Shield size={18} className={o.is_admin ? "text-amber-400" : "text-sasp-glow/70"} />
                          </div>
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="font-display font-bold text-sasp-ice truncate">{o.display_name || o.email}</span>
                              {o.is_admin && <span className="px-1.5 py-0.5 rounded text-[9px] uppercase tracking-widest font-bold bg-amber-500/20 border border-amber-400/40 text-amber-300">Admin</span>}
                              {isSelf && <span className="px-1.5 py-0.5 rounded text-[9px] uppercase tracking-widest font-bold bg-sasp-glow/20 border border-sasp-glow/40 text-sasp-glow">Ty</span>}
                            </div>
                            <div className="font-mono text-[10px] text-sasp-glow/50 truncate">{o.email}</div>
                          </div>
                          <button onClick={() => toggleAdmin(o)} disabled={busy || isSelf}
                                  title={o.is_admin ? 'Odebrat admin práva' : 'Udělit admin práva'}
                                  className={`p-2 rounded-md border transition disabled:opacity-30 disabled:cursor-not-allowed
                                              ${o.is_admin ? 'border-amber-400/40 text-amber-400 hover:bg-amber-500/10' : 'border-sasp-glow/20 text-sasp-glow/60 hover:text-sasp-glow hover:border-sasp-glow/50'}`}>
                            <Icons.Shield size={14} />
                          </button>
                          <button onClick={() => setConfirmRemove(o)} disabled={busy || isSelf}
                                  title={isSelf ? 'Nemůžeš odebrat sám sebe' : 'Odebrat officera'}
                                  className="p-2 rounded-md border border-red-400/30 text-red-400/80 hover:text-red-400 hover:border-red-400/60 transition disabled:opacity-30 disabled:cursor-not-allowed">

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const auth = useAuth();
  const isOfficer = !!auth.officer;

  const [vehicles, setVehicles] = useState([]);
  const [loading, setLoading] = useState(true);
  const [connected, setConnected] = useState(false);
  const [syncing, setSyncing] = useState(false);

  const [query, setQuery] = useState('');
  const [filters, setFilters] = useState({ tier: null, response: null });
  const [sortBy, setSortBy] = useState('tier');
  const [selected, setSelected] = useState(null);
  const [pinned, setPinned] = useState(() => loadSet(STORAGE_KEY_PINNED));
  const [showPinnedOnly, setShowPinnedOnly] = useState(false);
  const [cmdOpen, setCmdOpen] = useState(false);
  const [loginOpen, setLoginOpen] = useState(false);
  const [editorOpen, setEditorOpen] = useState(false);
  const [editorVehicle, setEditorVehicle] = useState(null);  // null = add, obj = edit
  const [adminOpen, setAdminOpen] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [toast, setToast] = useState(null);

  function showToast(message, type = 'info') {
    setToast({ message, type });
    setTimeout(() => setToast(null), 3000);
  }

  // ----- LOAD VEHICLES from Supabase -----
  useEffect(() => {
    if (!supabase) { setLoading(false); return; }

    let cancelled = false;
    async function load() {
      setLoading(true);
      const { data, error } = await supabase.from('vehicles').select('*').order('vehicle');
      if (cancelled) return;
      if (error) {
        console.error('Failed to load vehicles:', error);
        showToast('Nepodařilo se načíst data: ' + error.message, 'error');
        setConnected(false);
      } else {
        setVehicles(data || []);
        setConnected(true);
      }
      setLoading(false);
    }
    load();

    // ----- REALTIME subscription -----
    const channel = supabase
      .channel('vehicles-realtime')
      .on('postgres_changes',
          { event: '*', schema: 'public', table: 'vehicles' },
          (payload) => {
            if (cancelled) return;
            if (payload.eventType === 'INSERT') {
              setVehicles(prev => {
                if (prev.some(v => v.id === payload.new.id)) return prev;
                return [...prev, payload.new];
              });
              showToast(`Přidáno: ${payload.new.vehicle}`, 'success');
            } else if (payload.eventType === 'UPDATE') {
              setVehicles(prev => prev.map(v => v.id === payload.new.id ? payload.new : v));
              showToast(`Aktualizováno: ${payload.new.vehicle}`, 'info');
            } else if (payload.eventType === 'DELETE') {
              setVehicles(prev => prev.filter(v => v.id !== payload.old.id));
              showToast(`Smazáno`, 'info');
            }
          })
      .subscribe();

    return () => { cancelled = true; supabase.removeChannel(channel); };
  }, []);

  // ⌘K shortcut
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        setCmdOpen(true);
      }
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, []);

  const togglePin = useCallback((id) => {
    setPinned(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      saveSet(STORAGE_KEY_PINNED, next);
      return next;
    });
  }, []);

  // ----- ADD / EDIT vehicle -----
  async function saveVehicle(form, imageFile) {
    setSyncing(true);
    try {
      let imageUrl = form.image;

      // Upload new image if provided
      if (imageFile) {
        const ext = imageFile.name.split('.').pop().toLowerCase();
        const path = `${form.id}-${Date.now()}.${ext}`;
        const { error: upErr } = await supabase.storage
          .from(CFG.STORAGE_BUCKET || 'vehicles')
          .upload(path, imageFile, { cacheControl: '3600', upsert: false });
        if (upErr) throw upErr;
        const { data: urlData } = supabase.storage
          .from(CFG.STORAGE_BUCKET || 'vehicles')
          .getPublicUrl(path);
        imageUrl = urlData.publicUrl;
      }

      const payload = {
        id: form.id,
        vehicle: form.vehicle,
        tier: form.tier,
        responses: form.responses,
        notes: form.notes || '',
        image: imageUrl || null,
        updated_by: auth.session?.user?.email || null,
      };

      const isEdit = vehicles.some(v => v.id === form.id);
      if (isEdit) {
        const { error } = await supabase.from('vehicles').update(payload).eq('id', form.id);
        if (error) throw error;
      } else {
        const { error } = await supabase.from('vehicles').insert(payload);
        if (error) throw error;
      }
      showToast(isEdit ? 'Uloženo' : 'Vytvořeno', 'success');
    } catch (e) {
      showToast('Chyba: ' + e.message, 'error');
      throw e;  // re-throw so editor shows the error
    } finally {
      setSyncing(false);
    }
  }

  // ----- DELETE vehicle -----
  async function deleteVehicle(v) {
    setSyncing(true);
    try {
      const { error } = await supabase.from('vehicles').delete().eq('id', v.id);
      if (error) throw error;
      showToast(`Smazáno: ${v.vehicle}`, 'success');
      setSelected(null);
    } catch (e) {
      showToast('Chyba: ' + e.message, 'error');
    } finally {
      setSyncing(false);
      setConfirmDelete(null);
    }
  }

  async function handleLogout() {
    await supabase.auth.signOut();
    showToast('Odhlášeno', 'info');
  }

  // ----- SEARCH / FILTER / SORT -----
  const fuse = useMemo(() => new Fuse(vehicles, {
    keys: ['vehicle', 'notes', { name: 'responses.cars', weight: 0.5 }],
    threshold: 0.4, ignoreLocation: true,
  }), [vehicles]);

  function highestResponseTier(v) {
    if (!v.responses?.length) return v.tier;
    const tiers = v.responses.map(r => r.tier);
    if (tiers.includes('S+')) return 'S+';
    if (tiers.includes('S')) return 'S';
    if (tiers.includes('A+')) return 'A+';
    return 'A';
  }

  const filtered = useMemo(() => {
    let list = vehicles;
    if (showPinnedOnly) list = list.filter(v => pinned.has(v.id));
    if (filters.tier) {
      list = list.filter(v => v.tier === filters.tier || (v.responses || []).some(r => r.tier === filters.tier));
    }
    if (filters.response) {
      list = list.filter(v => (v.responses || []).some(r => (r.cars || []).includes(filters.response)));
    }
    if (query.trim()) {
      const results = fuse.search(query.trim());
      const ids = new Set(results.map(r => r.item.id));
      list = list.filter(v => ids.has(v.id));
    }
    list = [...list];
    if (sortBy === 'tier') {
      list.sort((a, b) => {
        const pa = pinned.has(a.id) ? 0 : 1;
        const pb = pinned.has(b.id) ? 0 : 1;
        if (pa !== pb) return pa - pb;
        const ta = TIER_ORDER[highestResponseTier(a)] ?? 99;
        const tb = TIER_ORDER[highestResponseTier(b)] ?? 99;
        if (ta !== tb) return ta - tb;
        return a.vehicle.localeCompare(b.vehicle, 'cs');
      });
    } else {
      list.sort((a, b) => {
        const pa = pinned.has(a.id) ? 0 : 1;
        const pb = pinned.has(b.id) ? 0 : 1;
        if (pa !== pb) return pa - pb;
        return a.vehicle.localeCompare(b.vehicle, 'cs');
      });
    }
    return list;
  }, [query, filters, sortBy, pinned, showPinnedOnly, fuse, vehicles]);

  // Render setup hint if not configured
  if (!SUPABASE_CONFIGURED) return <SetupHint />;

  // Render login gate if not logged in
  if (!auth.loading && !auth.session) {
    return (
      <div className="relative min-h-screen flex items-center justify-center p-6">
        <motion.div
          initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}
          className="max-w-md w-full clip-corners glass-strong rounded-lg p-8 border-sasp-glow/30 shadow-[0_0_60px_rgba(59,130,246,0.25)] text-center"
        >
          <svg viewBox="0 0 100 100" className="w-20 h-20 mx-auto text-sasp-glow drop-shadow-[0_0_12px_rgba(96,165,250,0.6)]" fill="none" stroke="currentColor" strokeWidth="3">
            <path d="M50 10 L85 24 V54 C85 73 70 88 50 94 C30 88 15 73 15 54 V24 Z" strokeLinejoin="round" />
            <path d="M50 18 L78 30 V54 C78 69 65 81 50 86 C35 81 22 69 22 54 V30 Z" opacity="0.35" />
            <text x="50" y="58" fontFamily="JetBrains Mono" fontSize="22" fontWeight="800" textAnchor="middle" fill="currentColor" stroke="none">TEU</text>
          </svg>
          <h1 className="font-display font-bold text-3xl tracking-wider headline-emboss text-glow mt-6 mb-2">
            SASP TEU
          </h1>
          <div className="font-mono text-[10px] uppercase tracking-[0.35em] text-sasp-glow/70 mb-6">
            Restricted Access
          </div>
          <p className="text-sasp-ice/70 mb-6 leading-relaxed text-sm">
            Databáze lokátorů obsahuje citlivé taktické informace.
            Přístup omezen pouze pro autorizovaný personál SASP.
          </p>
          <button onClick={() => setLoginOpen(true)}
                  className="w-full px-4 py-3 rounded-md bg-sasp-glow text-sasp-black hover:bg-sasp-ice transition font-mono text-xs uppercase tracking-widest flex items-center justify-center gap-2">
            <Icons.Lock size={14} />
            <span>Přihlásit se</span>
          </button>
          <p className="font-mono text-[9px] uppercase tracking-widest text-sasp-glow/40 mt-6">
            Unauthorized access is prohibited
          </p>
        </motion.div>
        <AnimatePresence>
          {loginOpen && <LoginModal open={loginOpen} onClose={() => setLoginOpen(false)} />}
        </AnimatePresence>
      </div>
    );
  }

  return (
    <div className="relative min-h-screen">
      <Header
        onCommand={() => setCmdOpen(true)}
        auth={auth}
        onLogin={() => setLoginOpen(true)}
        onLogout={handleLogout}
        onAddVehicle={() => { setEditorVehicle(null); setEditorOpen(true); }}
        onAdminPanel={() => setAdminOpen(true)}
        connected={connected}
        syncing={syncing}
      />

      <main className="relative z-10 max-w-[1600px] mx-auto px-4 md:px-8 py-8 md:py-12">
        <motion.div
          initial={{ opacity: 0, y: 16 }} animate={{ opacity: 1, y: 0 }}
          transition={{ duration: 0.6, ease: [0.16, 1, 0.3, 1] }}
          className="mb-8 md:mb-12 max-w-3xl"
        >
          <div className="flex items-center gap-2 font-mono text-[10px] uppercase tracking-[0.4em] text-sasp-glow/60 mb-3">
            <span className="block w-8 h-px bg-sasp-glow/40" />
            <span>Interní · TEU-DB · ÚROVEŇ 3</span>
          </div>
          <h1 className="font-display font-bold text-4xl md:text-6xl tracking-wide headline-emboss leading-[1.05] text-glow mb-3">
            Databáze response<br/>jednotek
          </h1>
          <p className="text-sasp-ice/60 text-base md:text-lg leading-relaxed max-w-2xl">
            Tier list suspect vozidel a doporučených pursuit jednotek. Cloud sync přes Supabase —
            změny se okamžitě promítnou všem připojeným důstojníkům.
          </p>
        </motion.div>

        {/* Search */}
        <div className="relative group mb-6">
          <div className="absolute inset-y-0 left-0 flex items-center pl-4 text-sasp-glow/60 group-focus-within:text-sasp-glow transition">
            <Icons.Search size={18} />
          </div>
          <input
            type="text" value={query} onChange={(e) => setQuery(e.target.value)}
            placeholder="Hledej vozidlo, response jednotku nebo poznámku..."
            className="!w-full !pl-12 !pr-28 !py-3 md:!py-3.5 !rounded-md !text-sm"
            autoComplete="off"
          />
          {query && (
            <button onClick={() => setQuery('')}
                    className="absolute inset-y-0 right-3 my-auto h-7 w-7 rounded-md flex items-center justify-center text-sasp-glow/60 hover:text-sasp-glow hover:bg-sasp-glow/10 transition"
                    aria-label="Smazat">
              <Icons.X size={14} />
            </button>
          )}
        </div>

        {/* Filters & stats */}
        <div className="space-y-4 mb-6">
          <div className="flex items-center justify-between flex-wrap gap-3">
            <div className="flex items-center gap-3 font-mono text-[10px] uppercase tracking-[0.25em]">
              <span className="text-sasp-glow/60">
                <span className="text-sasp-glow text-sm font-bold">{filtered.length}</span>
                <span className="mx-1.5">/</span>
                <span>{vehicles.length} záznamů</span>
              </span>
              {pinned.size > 0 && (
                <>
                  <span className="text-sasp-glow/30">·</span>
                  <button onClick={() => setShowPinnedOnly(!showPinnedOnly)}
                          className={`flex items-center gap-1.5 px-2 py-1 rounded-md border transition
                                      ${showPinnedOnly ? 'border-sasp-glow text-sasp-glow bg-sasp-glow/10'
                                                       : 'border-sasp-glow/20 text-sasp-glow/70 hover:border-sasp-glow/50'}`}>
                    <Icons.PinFill size={10} />
                    <span>{pinned.size} připnuto</span>
                  </button>
                </>
              )}
            </div>
            <div className="flex items-center gap-2 font-mono text-[10px] uppercase tracking-widest text-sasp-glow/60">
              <Icons.Sort size={12} />
              <span>Řadit:</span>
              {['tier', 'name'].map(s => (
                <button key={s} onClick={() => setSortBy(s)}
                        className={`px-2 py-1 rounded transition ${sortBy === s ? 'text-sasp-glow bg-sasp-glow/10' : 'text-sasp-glow/50 hover:text-sasp-glow'}`}>
                  {s === 'tier' ? 'tier' : 'název'}
                </button>
              ))}
            </div>
          </div>

          <div className="grid md:grid-cols-2 gap-4 p-4 glass clip-corners rounded-md">
            <div className="flex flex-col gap-2">
              <span className="font-mono text-[10px] uppercase tracking-[0.3em] text-sasp-glow/50">Tier</span>
              <div className="flex flex-wrap gap-1.5">
                <FilterChip active={filters.tier === null} onClick={() => setFilters(f => ({...f, tier: null}))}>Vše</FilterChip>
                {Object.keys(TIER_META).map(t => (
                  <FilterChip key={t} active={filters.tier === t} onClick={() => setFilters(f => ({...f, tier: t}))} color={TIER_META[t].color}>
                    {t}
                  </FilterChip>
                ))}
              </div>
            </div>
            <div className="flex flex-col gap-2">
              <span className="font-mono text-[10px] uppercase tracking-[0.3em] text-sasp-glow/50">Response jednotka</span>
              <div className="flex flex-wrap gap-1.5">
                <FilterChip active={filters.response === null} onClick={() => setFilters(f => ({...f, response: null}))}>Vše</FilterChip>
                {ALL_RESPONSE_CARS.map(c => (
                  <FilterChip key={c} active={filters.response === c} onClick={() => setFilters(f => ({...f, response: c}))}>{c}</FilterChip>
                ))}
              </div>
            </div>
          </div>
        </div>

        {loading ? (
          <div className="py-20 text-center">
            <Icons.Loader size={32} className="mx-auto text-sasp-glow/60 mb-4" />
            <p className="font-mono text-xs uppercase tracking-widest text-sasp-glow/50">Načítám databázi...</p>
          </div>
        ) : filtered.length === 0 ? (
          <div className="py-20 text-center">
            <Icons.Crosshair size={48} className="mx-auto text-sasp-glow/30 mb-4" />
            <h3 className="font-display text-xl text-sasp-ice/70 mb-2">Žádné výsledky</h3>
            <p className="font-mono text-xs uppercase tracking-widest text-sasp-glow/50">
              {vehicles.length === 0 ? 'Databáze je prázdná. Naseed ji nebo přidej první vozidlo.' : 'Zkus jiná klíčová slova nebo zruš filtry.'}
            </p>
            {(query || filters.tier || filters.response || showPinnedOnly) && (
              <button onClick={() => { setQuery(''); setFilters({ tier: null, response: null }); setShowPinnedOnly(false); }}
                      className="mt-4 px-4 py-2 rounded-md glass border border-sasp-glow/30 font-mono text-[11px] uppercase tracking-widest text-sasp-glow hover:border-sasp-glow/60 transition">
                Resetovat
              </button>
            )}
          </div>
        ) : (
          <motion.div layout className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-5">
            <AnimatePresence mode="popLayout">
              {filtered.map((v, i) => (
                <VehicleCard
                  key={v.id} v={v} index={i}
                  pinned={pinned.has(v.id)} onTogglePin={() => togglePin(v.id)}
                  onSelect={() => setSelected(v)}
                  isOfficer={isOfficer}
                  onEdit={(veh) => { setEditorVehicle(veh); setEditorOpen(true); }}
                  onDelete={(veh) => setConfirmDelete(veh)}
                />
              ))}
            </AnimatePresence>
          </motion.div>
        )}

        <footer className="mt-20 pt-8 border-t border-sasp-glow/10">
          <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 font-mono text-[10px] uppercase tracking-[0.3em] text-sasp-glow/40">
            <span>SASP TEU · v2.0 Supabase · {connected ? 'Online' : 'Offline'}</span>
            <span className="flex items-center gap-3">
              <span>⌘K Hledání</span>
              <span className="text-sasp-glow/20">·</span>
              <span>ESC Zavřít</span>
            </span>
          </div>
        </footer>
      </main>

      <AnimatePresence>
        {selected && (
          <VehicleModal v={selected} onClose={() => setSelected(null)}
                        pinned={pinned.has(selected.id)} onTogglePin={() => togglePin(selected.id)}
                        isOfficer={isOfficer}
                        onEdit={(v) => { setSelected(null); setEditorVehicle(v); setEditorOpen(true); }}
                        onDelete={(v) => { setSelected(null); setConfirmDelete(v); }} />
        )}
      </AnimatePresence>

      <AnimatePresence>
        {loginOpen && <LoginModal open={loginOpen} onClose={() => setLoginOpen(false)} />}
      </AnimatePresence>

      <AnimatePresence>
        {adminOpen && (
          <AdminPanel
            open={adminOpen}
            onClose={() => setAdminOpen(false)}
            currentUserEmail={auth.session?.user?.email}
          />
        )}
      </AnimatePresence>

      <AnimatePresence>
        {editorOpen && (
          <VehicleEditor
            open={editorOpen}
            vehicle={editorVehicle}
            isUploading={syncing}
            onClose={() => { setEditorOpen(false); setEditorVehicle(null); }}
            onSave={saveVehicle}
          />
        )}
      </AnimatePresence>

      <AnimatePresence>
        {confirmDelete && (
          <ConfirmDialog
            open={!!confirmDelete}
            title="Smazat vozidlo?"
            message={`Opravdu chceš smazat "${confirmDelete.vehicle}"? Tato akce je nevratná.`}
            confirmText="Smazat"
            danger
            onCancel={() => setConfirmDelete(null)}
            onConfirm={() => deleteVehicle(confirmDelete)}
          />
        )}
      </AnimatePresence>

      {/* Toast notifications */}
      <AnimatePresence>
        {toast && (
          <motion.div
            initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: 20 }}
            className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[80] px-5 py-3 rounded-md glass-strong border shadow-2xl font-mono text-sm uppercase tracking-widest"
            style={{
              borderColor: toast.type === 'error' ? 'rgba(239,68,68,0.5)' : toast.type === 'success' ? 'rgba(34,197,94,0.5)' : 'rgba(96,165,250,0.5)',
              color: toast.type === 'error' ? '#fca5a5' : toast.type === 'success' ? '#86efac' : '#cbe4ff',
            }}
          >
            {toast.message}
          </motion.div>
        )}
      </AnimatePresence>
    </div>
  );
}

function FilterChip({ children, active, onClick, color }) {
  return (
    <button onClick={onClick}
            className={`px-3 py-1.5 rounded-md font-mono text-[10px] uppercase tracking-widest transition border
                        ${active ? 'text-sasp-black border-transparent shadow-[0_0_16px_rgba(96,165,250,0.4)]'
                                 : 'text-sasp-glow/70 hover:text-sasp-glow border-sasp-glow/15 hover:border-sasp-glow/40 glass'}`}
            style={active ? {
              background: color ? `linear-gradient(135deg, ${color}, ${color}dd)` : 'linear-gradient(135deg, #60a5fa, #3b82f6)',
              color: color ? '#000' : '#04060c',
            } : {}}>
      {children}
    </button>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
